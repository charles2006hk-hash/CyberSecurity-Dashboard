<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security 即時情報總結</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .critical { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Cyber Intelligence Dashboard</h1>
                <p class="text-slate-500">自動追蹤 SOC Prime、BleepingComputer 等最新威脅</p>
            </div>
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow">
                導出日報 (PDF)
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded shadow-sm border border-slate-200">
                <div class="text-sm text-slate-500">當前監控來源</div>
                <div class="text-xl font-bold text-blue-600">3 個權威渠道</div>
            </div>
            <div id="last-update" class="bg-white p-4 rounded shadow-sm border border-slate-200">
                <div class="text-sm text-slate-500">最後更新時間</div>
                <div class="text-xl font-bold text-slate-700">正在檢查...</div>
            </div>
        </div>

        <div id="news-container" class="space-y-4">
            <div class="text-center py-10 text-slate-400 loading">正在從全球安全伺服器獲取即時情報...</div>
        </div>
    </div>

    <script>
        // 使用 RSS2JSON API 來繞過瀏覽器限制
        const FEEDS = [
            'https://www.bleepingcomputer.com/feed/',
            'https://thehackernews.com/feeds/posts/default',
            'https://socprime.com/feed/'
        ];

        async function fetchNews() {
            const container = document.getElementById('news-container');
            const timeLabel = document.getElementById('last-update').querySelector('.text-xl');
            let allItems = [];

            try {
                for (let url of FEEDS) {
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    if (data.status === 'ok') {
                        allItems = allItems.concat(data.items.slice(0, 5));
                    }
                }

                // 按日期排序
                allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

                // 渲染 HTML
                container.innerHTML = '';
                allItems.forEach(item => {
                    const isCritical = /vulnerability|exploit|critical|3cx|zero-day/i.test(item.title);
                    const div = document.createElement('div');
                    div.className = `bg-white p-6 rounded shadow-sm border border-slate-200 ${isCritical ? 'critical' : ''}`;
                    div.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-bold text-slate-800">${item.title}</h3>
                            <span class="text-xs font-mono text-slate-400">${item.pubDate}</span>
                        </div>
                        <p class="text-slate-600 mt-2 text-sm line-clamp-2">${item.description.replace(/<[^>]*>?/gm, '')}</p>
                        <div class="mt-4 flex gap-4 items-center">
                            <a href="${item.link}" target="_blank" class="text-blue-600 text-sm font-medium hover:underline italic text-xs">查看詳細偵測規則 ></a>
                            ${isCritical ? '<span class="px-2 py-1 bg-red-100 text-red-600 text-[10px] font-bold rounded">HIGH PRIORITY</span>' : ''}
                        </div>
                    `;
                    container.appendChild(div);
                });

                timeLabel.innerText = new Date().toLocaleTimeString();

            } catch (error) {
                container.innerHTML = '<div class="text-red-500 text-center">抓取失敗，請檢查網絡連接或重新整理。</div>';
            }
        }

        // 初始加載
        fetchNews();
        // 每 30 分鐘自動刷新
        setInterval(fetchNews, 1800000);
    </script>
</body>
</html>
