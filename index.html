<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BT Cyber Intelligence Report - Powered by Gemini 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } body { background: white; } .report-card { break-inside: avoid; border: 1px solid #eee; margin-bottom: 20px; } }
        .typing { border-right: 2px solid #3b82f6; animation: blink 0.75s step-end infinite; }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #3b82f6 } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden">
        <div class="bg-[#000031] text-white p-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter text-blue-400">BT GLOBAL SECURITY</h1>
                <p class="text-sm opacity-70">Automated Threat Intelligence Dashboard v3.0</p>
            </div>
            <div class="no-print">
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-bold transition">導出 PDF 日報</button>
            </div>
        </div>

        <div class="p-8">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <div class="text-gray-500 text-sm italic">報告生成時間: <span id="date"></span></div>
                <div id="status" class="text-blue-600 text-xs font-bold animate-pulse">正在同步全球情報...</div>
            </div>

            <div id="news-list" class="space-y-8">
                </div>
        </div>
        
        <footer class="bg-gray-100 p-4 text-center text-[10px] text-gray-400 uppercase tracking-widest">
            Internal Use Only | Confidential | BT Cyber SOC Division
        </footer>
    </div>

    <script>
        document.getElementById('date').innerText = new Date().toLocaleString();

        async function init() {
            const list = document.getElementById('news-list');
            const status = document.getElementById('status');
            
            try {
                // 1. 抓取 RSS 新聞 (使用 rss2json 繞過跨域)
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.bleepingcomputer.com/feed/')}`);
                const data = await res.json();
                const news = data.items.slice(0, 5); // 抓取前 5 條

                list.innerHTML = '';
                
                // 2. 先渲染新聞框架
                for(let [idx, item] of news.entries()) {
                    const card = document.createElement('div');
                    card.className = "report-card border-l-4 border-slate-200 pl-6 py-2";
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-extrabold text-slate-800 mb-2">${item.title}</h3>
                            <span class="text-xs text-gray-400 font-mono">${item.pubDate.split(' ')[0]}</span>
                        </div>
                        <p class="text-gray-500 text-sm mb-4 line-clamp-2">${item.description.replace(/<[^>]*>?/gm, '')}</p>
                        <div id="ai-${idx}" class="bg-blue-50 p-4 rounded-lg border border-blue-100 hidden">
                            <div class="text-[10px] font-black text-blue-700 mb-2 tracking-widest uppercase">AI Security Insight (Gemini 3)</div>
                            <div class="text-sm text-slate-700 leading-relaxed ai-content typing">正在進行深度分析...</div>
                        </div>
                    `;
                    list.appendChild(card);
                }

                status.innerText = "情報同步完成，AI 正在分析中...";

                // 3. 逐條啟動 AI 分析 (避免併發過高，雖然收費版支持，但逐條顯示更有質感)
                for(let i = 0; i < news.length; i++) {
                    const aiBox = document.getElementById(`ai-${i}`);
                    aiBox.classList.remove('hidden');
                    
                    try {
                        const aiRes = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ title: news[i].title })
                        });
                        const aiData = await aiRes.json();
                        aiBox.querySelector('.ai-content').classList.remove('typing');
                        aiBox.querySelector('.ai-content').innerText = aiData.text || aiData.error;
                    } catch (e) {
                        aiBox.querySelector('.ai-content').innerText = "分析超時，請重新整理。";
                    }
                }
                
                status.innerText = "✅ 全部分析已就緒";
                status.classList.remove('animate-pulse');

            } catch (err) {
                status.innerText = "❌ 獲取情報失敗";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
