<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Professional SOC Intelligence Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .report-card { break-inside: avoid; border: 1px solid #e2e8f0; margin-bottom: 1rem; }
            .ai-analysis { background-color: #f8fafc !important; color: #1e293b !important; }
        }
        .ai-loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden">
        <div class="bg-slate-900 text-white p-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">SOC 每日威脅情報報告</h1>
                <p class="text-slate-400 text-sm mt-1">針對 BT 公司網路安全架構之預警分析</p>
            </div>
            <div class="text-right text-xs text-slate-400 no-print">
                <button onclick="runAIAnalysis()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500 mr-2">執行 AI 深度分析</button>
                <button onclick="window.print()" class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-500">導出 PDF 報告</button>
            </div>
        </div>

        <div class="p-8">
            <div class="grid grid-cols-2 gap-4 mb-8 border-b pb-6 border-gray-100 text-sm">
                <div><span class="font-bold text-gray-600">報告日期：</span> <span id="current-date"></span></div>
                <div><span class="font-bold text-gray-600">分析等級：</span> <span class="text-red-600 font-bold">高優先級 (High)</span></div>
            </div>

            <div id="report-content" class="space-y-6">
                <div class="text-center py-20 text-gray-400">正在獲取全球最新威脅數據...</div>
            </div>
        </div>

        <div class="bg-gray-50 p-6 text-center text-[10px] text-gray-400 border-t border-gray-100">
            CONFIDENTIAL - FOR INTERNAL USE ONLY | Generated by Automated Threat Intel Tool
        </div>
    </div>

    <script type="module">
        // --- 配置區 ---
        const API_KEY = 'AIzaSyBw6KQZimLRK5WcrE_Jf7nb81geKlKtcNI'; // 請填入 API Key
        const FEEDS = ['https://www.bleepingcomputer.com/feed/', 'https://thehackernews.com/feeds/posts/default'];

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-HK', {dateStyle: 'full'});

        async function fetchNews() {
            const container = document.getElementById('report-content');
            let items = [];
            try {
                for (let url of FEEDS) {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    items = items.concat(data.items.slice(0, 4));
                }
                renderReport(items);
            } catch (e) { container.innerHTML = "數據加載失敗。"; }
        }

        function renderReport(items) {
            const container = document.getElementById('report-content');
            container.innerHTML = items.map((item, idx) => `
                <div class="report-card p-5 border border-gray-200 rounded-md">
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="font-bold text-lg text-slate-800 leading-tight">${item.title}</h2>
                        <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500 uppercase font-mono">${item.pubDate.split(' ')[0]}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-4">${item.description.replace(/<[^>]*>?/gm, '').substring(0, 150)}...</p>
                    <div id="ai-space-${idx}" class="ai-analysis hidden p-4 bg-blue-50 border-l-4 border-blue-400 rounded">
                        <div class="text-xs font-bold text-blue-800 mb-1 uppercase tracking-wider">AI 分析與建議 (Gemini-Flash 3)</div>
                        <div class="text-sm text-blue-900 italic content">正在生成分析...</div>
                    </div>
                </div>
            `).join('');
        }

        window.runAIAnalysis = async () => {
    const cards = document.querySelectorAll('.report-card');
    for(let [idx, card] of cards.entries()) {
        const aiSpace = document.getElementById(`ai-space-${idx}`);
        const title = card.querySelector('h2').innerText;
        aiSpace.classList.remove('hidden');
        
        try {
            // 改為請求 Vercel 內部的 API
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title }) 
            });
            const data = await response.json();
            aiSpace.querySelector('.content').innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            aiSpace.querySelector('.content').innerText = "分析請求失敗。";
        }
    }
};

        fetchNews();
    </script>
</body>
</html>
