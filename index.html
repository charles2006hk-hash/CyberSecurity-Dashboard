<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BT SOC Intelligence Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } body { background: white; } }
        .category-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: bold; text-transform: uppercase; }
        .tag-malware { background: #fee2e2; color: #991b1b; }
        .tag-identity { background: #fef9c3; color: #854d0e; }
        .tag-infrastructure { background: #dcfce7; color: #166534; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="no-print bg-white p-6 rounded-t-xl shadow-sm border-b flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold text-slate-800">BT Intelligence Archive</h1>
                <select id="filter-type" class="border rounded px-3 py-1 text-sm bg-gray-50">
                    <option value="all">所有即時情報</option>
                    <option value="saved">已收藏歸類 (Saved)</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchNews()" class="bg-slate-800 text-white px-4 py-2 rounded text-sm font-medium hover:bg-slate-700">刷新情報</button>
                <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-500">導出 PDF</button>
            </div>
        </div>

        <div id="main-container" class="bg-white p-8 shadow-sm rounded-b-xl space-y-8">
            <div id="status-msg" class="text-center text-gray-400 py-10">正在初始化系統...</div>
        </div>
    </div>

    <script>
        // 1. 初始化與新聞抓取
        async function fetchNews() {
            const container = document.getElementById('main-container');
            const status = document.getElementById('status-msg');
            container.innerHTML = '<div class="text-center py-10 animate-pulse text-blue-600">正在獲取全球安全動態...</div>';

            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.bleepingcomputer.com/feed/')}`);
                const data = await res.json();
                renderNews(data.items.slice(0, 6));
            } catch (e) { container.innerHTML = "數據加載失敗，請檢查網路。"; }
        }

        // 2. 渲染新聞與 AI 分析框架
        function renderNews(items) {
            const container = document.getElementById('main-container');
            container.innerHTML = items.map((item, idx) => `
                <div class="report-card border-b pb-8 last:border-0" id="card-${idx}">
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-xl font-extrabold text-slate-800 hover:text-blue-600 cursor-pointer" id="title-${idx}">${item.title}</h2>
                        <div class="no-print flex gap-2">
                            <button onclick="saveArchive(${idx}, 'malware')" class="text-[10px] border px-2 py-1 rounded hover:bg-red-50">📂 歸類:惡意軟體</button>
                            <button onclick="saveArchive(${idx}, 'identity')" class="text-[10px] border px-2 py-1 rounded hover:bg-yellow-50">📂 歸類:身份認證</button>
                        </div>
                    </div>
                    <p class="text-gray-500 text-sm mb-4">${item.pubDate}</p>
                    
                    <div class="bg-slate-50 p-5 rounded-lg border-l-4 border-blue-500" id="ai-container-${idx}">
                        <div class="text-xs font-bold text-blue-800 mb-2 flex items-center gap-2">
                            <span>GEMINI 3 PRO ANALYSIS (Bilingual)</span>
                            <span class="loading-dots animate-ping h-1.5 w-1.5 rounded-full bg-blue-400"></span>
                        </div>
                        <div class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed" id="ai-text-${idx}">正在生成中英雙語分析報告...</div>
                    </div>
                </div>
            `).join('');

            // 觸發 AI 分析
            items.forEach((item, idx) => callAI(item.title, idx));
        }

        // 3. 呼叫後端 API (中英雙語)
        async function callAI(title, idx) {
            const textField = document.getElementById(`ai-text-${idx}`);
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title })
                });
                const data = await response.json();
                textField.innerText = data.text || data.error;
                document.querySelector(`#ai-container-${idx} .loading-dots`).remove();
            } catch (e) { textField.innerText = "分析請求失敗。"; }
        }

        // 4. 資訊歸類與儲存 (LocalStorage)
        function saveArchive(idx, cat) {
            const archiveData = {
                title: document.getElementById(`title-${idx}`).innerText,
                content: document.getElementById(`ai-text-${idx}`).innerText,
                category: cat,
                time: new Date().toLocaleString()
            };
            let current = JSON.parse(localStorage.getItem('bt_soc_archive') || '[]');
            current.push(archiveData);
            localStorage.setItem('bt_soc_archive', JSON.stringify(current));
            alert('已成功存檔並分類！');
        }

        window.onload = fetchNews;
    </script>
</body>
</html>
